<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Planify</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Supabase JS client (CDN, no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- Full-screen loader shown while fetching data from Supabase -->
<div id="appLoader">
  <div class="loader-inner">
    <svg class="loader-logo-svg" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="64" height="64" rx="16" fill="url(#grad-loader)"/>
      <!-- Calendar body -->
      <rect x="11" y="18" width="42" height="32" rx="6" fill="white" fill-opacity="0.18"/>
      <rect x="11" y="18" width="42" height="32" rx="6" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
      <!-- Calendar top bar -->
      <rect x="11" y="18" width="42" height="10" rx="6" fill="white" fill-opacity="0.28"/>
      <rect x="11" y="23" width="42" height="5" fill="white" fill-opacity="0.28"/>
      <!-- Hooks -->
      <rect x="21" y="13" width="4" height="9" rx="2" fill="white" fill-opacity="0.85"/>
      <rect x="39" y="13" width="4" height="9" rx="2" fill="white" fill-opacity="0.85"/>
      <!-- Grid dots -->
      <circle cx="23" cy="35" r="2.5" fill="white" fill-opacity="0.7"/>
      <circle cx="32" cy="35" r="2.5" fill="white" fill-opacity="0.7"/>
      <circle cx="41" cy="35" r="2.5" fill="white" fill-opacity="0.7"/>
      <circle cx="23" cy="43" r="2.5" fill="white" fill-opacity="0.7"/>
      <!-- Stethoscope head (highlight) -->
      <circle cx="41" cy="43" r="5" fill="white" fill-opacity="0.22" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
      <circle cx="41" cy="43" r="2" fill="white" fill-opacity="0.8"/>
      <defs>
        <linearGradient id="grad-loader" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6366f1"/>
          <stop offset="1" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="loader-spinner"></div>
    <p>Chargement…</p>
  </div>
</div>

<div class="header">
  <div class="header-logo">
    <!-- Illustrative SVG logo mark -->
    <svg class="logo-mark" width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="38" height="38" rx="10" fill="url(#grad-logo)"/>
      <!-- Calendar body -->
      <rect x="6" y="11" width="26" height="20" rx="4" fill="white" fill-opacity="0.18"/>
      <rect x="6" y="11" width="26" height="20" rx="4" stroke="white" stroke-width="1.5" stroke-opacity="0.55"/>
      <!-- Top bar -->
      <rect x="6" y="11" width="26" height="7" rx="4" fill="white" fill-opacity="0.22"/>
      <rect x="6" y="15" width="26" height="3" fill="white" fill-opacity="0.22"/>
      <!-- Hooks -->
      <rect x="13" y="7.5" width="2.5" height="6" rx="1.25" fill="white" fill-opacity="0.85"/>
      <rect x="22.5" y="7.5" width="2.5" height="6" rx="1.25" fill="white" fill-opacity="0.85"/>
      <!-- Grid dots row 1 -->
      <circle cx="13" cy="22" r="1.6" fill="white" fill-opacity="0.75"/>
      <circle cx="19" cy="22" r="1.6" fill="white" fill-opacity="0.75"/>
      <circle cx="25" cy="22" r="1.6" fill="white" fill-opacity="0.75"/>
      <!-- Stethoscope circle (bottom right cell) -->
      <circle cx="25" cy="27.5" r="3.2" fill="white" fill-opacity="0.18" stroke="white" stroke-width="1.2" stroke-opacity="0.65"/>
      <circle cx="25" cy="27.5" r="1.2" fill="white" fill-opacity="0.85"/>
      <defs>
        <linearGradient id="grad-logo" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6366f1"/>
          <stop offset="1" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
    </svg>
    <!-- Wordmark -->
    <div class="logo-wordmark">
      <span class="logo-plan">Plan</span><span class="logo-ify">ify</span>
      <span class="logo-tagline">planning infirmière</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="printCalendar()" title="Imprimer">🖨️</button>
    <button class="header-btn" onclick="exportICS()" title="Exporter .ics">📅</button>
  </div>
</div>

<div class="month-nav">
  <button class="month-nav-btn" onclick="changeMonth(-1)">◀</button>
  <h2>
    <span class="month-label" id="monthLabel"></span>
    <span class="year-label" id="yearLabel"></span>
  </h2>
  <button class="month-nav-btn" onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar-container" id="calendarContainer">
  <div class="weekday-header">
    <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span>
    <span class="weekend">Sam</span><span class="weekend">Dim</span>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
  <div class="print-legend" id="printLegend"></div>
  <div class="print-header">Planify — généré le <span id="printDate"></span></div>
</div>

<div class="bottom-spacer"></div>
<div class="batch-counter" id="batchCounter"></div>
<div id="toast" class="toast"></div>

<div class="bottom-bar" id="bottomBar">
  <button class="batch-btn" onclick="toggleBatchMode()">⚡ Multi-select</button>
  <button class="batch-btn today-btn" onclick="goToday()">📍 Aujourd'hui</button>
</div>

<div class="overlay" id="overlay"></div>

<!-- Event picker sheet -->
<div class="bottom-sheet" id="eventSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h3 id="sheetTitle">Choisir un événement</h3>
    <div class="sheet-date" id="sheetDate"></div>
  </div>
  <div class="sheet-current" id="sheetCurrent" style="display:none;">
    <div class="sheet-current-title">Sur ce jour</div>
    <div id="currentEventsList"></div>
  </div>
  <div class="sheet-divider" id="sheetDivider" style="display:none;"></div>
  <div class="sheet-section">
    <div class="sheet-section-title">Travail</div>
    <div class="sheet-grid" id="workChips"></div>
  </div>
  <div class="sheet-section">
    <div class="sheet-section-title">Repos</div>
    <div class="sheet-grid" id="offChips"></div>
  </div>
  <div class="sheet-section">
    <div class="sheet-section-title">Vacances</div>
    <div class="sheet-grid" id="vacationChips"></div>
  </div>
  <div class="sheet-section">
    <div class="sheet-section-title">Perso</div>
    <div class="sheet-grid" id="customChips"></div>
    <button class="manage-custom-btn" id="manageCustomBtn" style="display:none;">🗑️ Gérer mes types</button>
  </div>
  <div style="height: 24px;"></div>
</div>

<!-- Custom event creation sheet -->
<div class="bottom-sheet" id="customSheet">
  <div class="sheet-handle"></div>
  <div class="modal-content">
    <h3>✨ Nouvel événement</h3>
    <div class="form-group">
      <label>Nom</label>
      <input type="text" class="form-input" id="customName" placeholder="Ex: Formation, RDV...">
    </div>
    <div class="form-group">
      <label>Emoji</label>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label>Durée</label>
      <div class="duration-selector">
        <div class="duration-option active" data-dur="allday" onclick="selectDuration('allday', this)">
          <span class="dur-emoji">📅</span>
          <span class="dur-label">Journée</span>
          <span class="dur-desc">Toute la journée</span>
        </div>
        <div class="duration-option" data-dur="half" onclick="selectDuration('half', this)">
          <span class="dur-emoji">🕐</span>
          <span class="dur-label">Demi-journée</span>
          <span class="dur-desc">Matin ou après-midi</span>
        </div>
        <div class="duration-option" data-dur="custom" onclick="selectDuration('custom', this)">
          <span class="dur-emoji">⏰</span>
          <span class="dur-label">Horaires</span>
          <span class="dur-desc">Début / fin</span>
        </div>
      </div>
      <div class="half-day-selector" id="halfDaySelector">
        <div class="half-day-option active" data-half="morning" onclick="selectHalfDay('morning', this)">
          <span class="dur-emoji">☀️</span>
          <span class="dur-label">Matin</span>
          <span class="dur-desc">8h → 12h</span>
        </div>
        <div class="half-day-option" data-half="afternoon" onclick="selectHalfDay('afternoon', this)">
          <span class="dur-emoji">🌅</span>
          <span class="dur-label">Après-midi</span>
          <span class="dur-desc">13h → 18h</span>
        </div>
      </div>
      <div class="time-row-container" id="timeRowContainer">
        <div class="time-row">
          <div class="form-group">
            <label>Début</label>
            <input type="time" class="form-input" id="customStart">
          </div>
          <div class="form-group">
            <label>Fin</label>
            <input type="time" class="form-input" id="customEnd">
          </div>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeCustomSheet()">Annuler</button>
      <button class="btn btn-primary" onclick="saveCustomEvent()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Load order: config (Supabase client) → palette → storage → toast → calendar → sheet → modal → export → app -->
<script src="js/config.js"></script>
<script src="js/palette.js"></script>
<script src="js/storage.js"></script>
<script src="js/toast.js"></script>
<script src="js/calendar.js"></script>
<script src="js/sheet.js"></script>
<script src="js/modal.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

</body>
</html>
